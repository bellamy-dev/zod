name: Update README Preview

on:
  push:
    branches: [main]

jobs:
  screenshot-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect project root
        id: detect
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "dir=frontend" >> $GITHUB_OUTPUT
          else
            echo "dir=." >> $GITHUB_OUTPUT
          fi

      - name: Install & Build
        run: |
          cd ${{ steps.detect.outputs.dir }}
          npm install
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.detect.outputs.dir }}/dist

      - name: Install serve + Puppeteer
        run: |
          npm install -g serve
          npm install puppeteer

      - name: Take Screenshot
        run: |
          serve -s ${{ steps.detect.outputs.dir }}/dist -p 3000 &
          sleep 5
          node -e "
          const puppeteer = require('puppeteer');
          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle2', timeout: 60000 });
            await page.waitForTimeout(3000);
            await page.screenshot({ path: 'preview.png' });
            await browser.close();
          })();
          "

      - name: Push la preview
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Update preview"
          file_pattern: preview.png
